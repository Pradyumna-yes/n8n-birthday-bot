<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="soft-shadow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#92400e"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#451a03" font-size="24" font-weight="700">How one birthday becomes a personal WhatsApp message</text>
  <text x="600" y="76" text-anchor="middle" fill="#92400e" font-size="13">Same date, same bot — but every friend gets something that sounds like it came from you</text>

  <!-- STEP 1: Contact row -->
  <g>
    <rect x="60" y="140" width="250" height="240" rx="14" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <rect x="60" y="140" width="250" height="38" rx="14" fill="#f59e0b"/>
    <rect x="60" y="155" width="250" height="23" fill="#f59e0b"/>
    <text x="185" y="164" text-anchor="middle" fill="white" font-size="12" font-weight="600" letter-spacing="1">1 · CONTACT ROW</text>
    <text x="75" y="204" fill="#78350f" font-size="10" font-weight="600">full_name</text>
    <text x="295" y="204" text-anchor="end" fill="#451a03" font-size="11" font-weight="500">Priya Sharma</text>
    <text x="75" y="226" fill="#78350f" font-size="10" font-weight="600">phone_e164</text>
    <text x="295" y="226" text-anchor="end" fill="#451a03" font-size="11" font-family="monospace">918XXXXX1234</text>
    <text x="75" y="248" fill="#78350f" font-size="10" font-weight="600">birthday</text>
    <text x="295" y="248" text-anchor="end" fill="#451a03" font-size="11" font-family="monospace">1996-04-19</text>
    <text x="75" y="270" fill="#78350f" font-size="10" font-weight="600">tone</text>
    <text x="295" y="270" text-anchor="end" fill="#451a03" font-size="11">warm and funny</text>
    <text x="75" y="292" fill="#78350f" font-size="10" font-weight="600">language</text>
    <text x="295" y="292" text-anchor="end" fill="#451a03" font-size="11">Hinglish</text>
    <text x="75" y="314" fill="#78350f" font-size="10" font-weight="600">relationship</text>
    <text x="295" y="314" text-anchor="end" fill="#451a03" font-size="11">college friend</text>
    <text x="75" y="340" fill="#78350f" font-size="10" font-weight="600">inside_jokes</text>
    <text x="185" y="362" text-anchor="middle" fill="#451a03" font-size="10" font-style="italic">"always late to 9am lectures"</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M 320 260 L 370 260" stroke="#92400e" stroke-width="2.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- STEP 2: AI prompt -->
  <g>
    <rect x="380" y="140" width="380" height="240" rx="14" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="380" y="140" width="380" height="38" rx="14" fill="#8b5cf6"/>
    <rect x="380" y="155" width="380" height="23" fill="#8b5cf6"/>
    <text x="570" y="164" text-anchor="middle" fill="white" font-size="12" font-weight="600" letter-spacing="1">2 · AI PROMPT</text>
    <text x="400" y="204" fill="#4c1d95" font-size="11" font-weight="600">System:</text>
    <text x="400" y="222" fill="#1e1b4b" font-size="10">You're a thoughtful friend writing a WhatsApp</text>
    <text x="400" y="238" fill="#1e1b4b" font-size="10">birthday message. 2–4 sentences. Sound human.</text>
    <text x="400" y="254" fill="#1e1b4b" font-size="10">Weave one inside joke in naturally.</text>

    <text x="400" y="282" fill="#4c1d95" font-size="11" font-weight="600">User:</text>
    <text x="400" y="300" fill="#1e1b4b" font-size="10">Name: Priya</text>
    <text x="400" y="316" fill="#1e1b4b" font-size="10">Relationship: college friend</text>
    <text x="400" y="332" fill="#1e1b4b" font-size="10">Tone: warm and funny</text>
    <text x="400" y="348" fill="#1e1b4b" font-size="10">Language: Hinglish</text>
    <text x="400" y="364" fill="#1e1b4b" font-size="10">Inside joke: always late to 9am lectures</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M 770 260 L 820 260" stroke="#92400e" stroke-width="2.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- STEP 3: Output message -->
  <g>
    <rect x="830" y="140" width="310" height="240" rx="14" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="830" y="140" width="310" height="38" rx="14" fill="#10b981"/>
    <rect x="830" y="155" width="310" height="23" fill="#10b981"/>
    <text x="985" y="164" text-anchor="middle" fill="white" font-size="12" font-weight="600" letter-spacing="1">3 · GENERATED MESSAGE</text>

    <!-- WhatsApp bubble -->
    <rect x="850" y="200" width="270" height="160" rx="14" fill="#dcf8c6"/>
    <path d="M 850 340 Q 840 360 860 360" fill="#dcf8c6"/>
    <text x="870" y="228" fill="#111827" font-size="12" font-weight="500">Happy birthday Priya! 🎂</text>
    <text x="870" y="250" fill="#111827" font-size="11">Ek saal aur ho gaya, and somehow</text>
    <text x="870" y="266" fill="#111827" font-size="11">you're still the queen of 9am</text>
    <text x="870" y="282" fill="#111827" font-size="11">lectures — except now the excuse</text>
    <text x="870" y="298" fill="#111827" font-size="11">has upgraded from "alarm didn't</text>
    <text x="870" y="314" fill="#111827" font-size="11">ring" to "team call ran late".</text>
    <text x="870" y="336" fill="#111827" font-size="11">Have the best day, yaar. ✨</text>
    <text x="1095" y="354" text-anchor="end" fill="#6b7280" font-size="9">via 🤖 AI</text>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="1080" height="110" rx="10" fill="white" opacity="0.7"/>
    <text x="20" y="28" fill="#78350f" font-size="13" font-weight="700">The point:</text>
    <text x="20" y="52" fill="#451a03" font-size="12">Same workflow runs for everyone on their birthday. But because each row has different tone, language, and inside jokes,</text>
    <text x="20" y="72" fill="#451a03" font-size="12">the AI generates a unique message every time. Your cousin gets something different from your coworker, and neither</text>
    <text x="20" y="92" fill="#451a03" font-size="12">of them ever sees the copy-paste "HBD 🎉" treatment.</text>
  </g>
</svg>
