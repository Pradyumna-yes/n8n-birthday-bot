<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" font-family="'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="30%" r="80%">
      <stop offset="0" stop-color="#1a1f2e"/>
      <stop offset="1" stop-color="#0a0e18"/>
    </radialGradient>

    <linearGradient id="g-cron" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="g-google" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g-n8n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="g-supabase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g-ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g-wa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>

    <marker id="arr-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ec4899"/>
    </marker>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>

    <filter id="card-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1400" height="1100" fill="url(#bg-grad)"/>
  <rect width="1400" height="1100" fill="url(#dots)"/>

  <text x="700" y="70" text-anchor="middle" fill="#f9fafb" font-size="36" font-weight="800" letter-spacing="-1">🎂 Birthday Bot</text>
  <text x="700" y="100" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="400">A personalized WhatsApp wish. Every friend. Every birthday. On autopilot.</text>

  <g font-family="'Inter', sans-serif">
    <text x="140" y="175" fill="#64748b" font-size="10" font-weight="700" letter-spacing="3">① TRIGGER</text>
    <text x="430" y="175" fill="#64748b" font-size="10" font-weight="700" letter-spacing="3">② ORCHESTRATE</text>
    <text x="820" y="175" fill="#64748b" font-size="10" font-weight="700" letter-spacing="3">③ GENERATE</text>
    <text x="1130" y="175" fill="#64748b" font-size="10" font-weight="700" letter-spacing="3">④ DELIVER</text>
  </g>

  <line x1="330" y1="185" x2="330" y2="880" stroke="#334155" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="720" y1="185" x2="720" y2="880" stroke="#334155" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="1060" y1="185" x2="1060" y2="880" stroke="#334155" stroke-width="1" stroke-dasharray="3 6"/>

  <g filter="url(#card-glow)">
    <rect x="70" y="220" width="230" height="130" rx="20" fill="#1e1611" stroke="url(#g-cron)" stroke-width="1.5"/>
    <circle cx="125" cy="265" r="24" fill="url(#g-cron)" opacity="0.2"/>
    <text x="125" y="275" text-anchor="middle" font-size="24">⏰</text>
    <text x="160" y="253" fill="#fbbf24" font-size="10" font-weight="700" letter-spacing="2">SCHEDULER</text>
    <text x="160" y="276" fill="#f8fafc" font-size="17" font-weight="700">Daily Cron</text>
    <text x="90" y="310" fill="#cbd5e1" font-size="12">3 schedules per day</text>
    <text x="90" y="330" fill="#94a3b8" font-size="11">Tuned to midnight per timezone</text>
  </g>

  <g filter="url(#card-glow)">
    <rect x="70" y="460" width="230" height="130" rx="20" fill="#0f1a2e" stroke="url(#g-google)" stroke-width="1.5"/>
    <circle cx="125" cy="505" r="24" fill="url(#g-google)" opacity="0.2"/>
    <text x="125" y="515" text-anchor="middle" font-size="24">📇</text>
    <text x="160" y="493" fill="#60a5fa" font-size="10" font-weight="700" letter-spacing="2">SOURCE</text>
    <text x="160" y="516" fill="#f8fafc" font-size="17" font-weight="700">Google Contacts</text>
    <text x="90" y="550" fill="#cbd5e1" font-size="12">Your phone book, auto-synced</text>
    <text x="90" y="570" fill="#94a3b8" font-size="11">OAuth pulls names &amp; birthdays</text>
  </g>

  <g filter="url(#card-glow)">
    <rect x="370" y="220" width="320" height="670" rx="24" fill="#1c1024" stroke="url(#g-n8n)" stroke-width="1.8"/>
  </g>

  <circle cx="420" cy="270" r="28" fill="url(#g-n8n)" opacity="0.22"/>
  <text x="420" y="280" text-anchor="middle" font-size="28">⚙️</text>
  <text x="460" y="260" fill="#f472b6" font-size="10" font-weight="700" letter-spacing="2">ORCHESTRATOR</text>
  <text x="460" y="282" fill="#f8fafc" font-size="22" font-weight="800">n8n</text>
  <text x="460" y="304" fill="#94a3b8" font-size="11">Visual workflow engine</text>

  <line x1="395" y1="330" x2="665" y2="330" stroke="#4a1d4e" stroke-width="1"/>
  <text x="530" y="354" text-anchor="middle" fill="#f472b6" font-size="10" font-weight="700" letter-spacing="2">DAILY WORKFLOW</text>

  <g>
    <rect x="395" y="378" width="270" height="60" rx="12" fill="#2a0f30" stroke="#5a2061" stroke-width="1"/>
    <circle cx="425" cy="408" r="18" fill="#ec4899" opacity="0.25"/>
    <text x="425" y="413" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="700">1</text>
    <text x="455" y="402" fill="#f8fafc" font-size="13" font-weight="600">Wake up &amp; figure out today</text>
    <text x="455" y="422" fill="#94a3b8" font-size="11">Which timezone? What's today's date?</text>
  </g>
  <path d="M 530 445 L 530 460" stroke="#ec4899" stroke-width="2" marker-end="url(#arr-pink)"/>

  <g>
    <rect x="395" y="465" width="270" height="60" rx="12" fill="#2a0f30" stroke="#5a2061" stroke-width="1"/>
    <circle cx="425" cy="495" r="18" fill="#ec4899" opacity="0.25"/>
    <text x="425" y="500" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="700">2</text>
    <text x="455" y="489" fill="#f8fafc" font-size="13" font-weight="600">Pull contacts &amp; find birthdays</text>
    <text x="455" y="509" fill="#94a3b8" font-size="11">Query Supabase for today's matches</text>
  </g>
  <path d="M 530 532 L 530 547" stroke="#ec4899" stroke-width="2" marker-end="url(#arr-pink)"/>

  <g>
    <rect x="395" y="552" width="270" height="60" rx="12" fill="#2a0f30" stroke="#5a2061" stroke-width="1"/>
    <circle cx="425" cy="582" r="18" fill="#ec4899" opacity="0.25"/>
    <text x="425" y="587" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="700">3</text>
    <text x="455" y="576" fill="#f8fafc" font-size="13" font-weight="600">Check: already wished today?</text>
    <text x="455" y="596" fill="#94a3b8" font-size="11">Skip duplicates — idempotent logic</text>
  </g>
  <path d="M 530 619 L 530 634" stroke="#ec4899" stroke-width="2" marker-end="url(#arr-pink)"/>

  <g>
    <rect x="395" y="639" width="270" height="60" rx="12" fill="#2a0f30" stroke="#5a2061" stroke-width="1"/>
    <circle cx="425" cy="669" r="18" fill="#ec4899" opacity="0.25"/>
    <text x="425" y="674" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="700">4</text>
    <text x="455" y="663" fill="#f8fafc" font-size="13" font-weight="600">Ask AI to write the message</text>
    <text x="455" y="683" fill="#94a3b8" font-size="11">Using their tone, language &amp; jokes</text>
  </g>
  <path d="M 530 706 L 530 721" stroke="#ec4899" stroke-width="2" marker-end="url(#arr-pink)"/>

  <g>
    <rect x="395" y="726" width="270" height="60" rx="12" fill="#2a0f30" stroke="#5a2061" stroke-width="1"/>
    <circle cx="425" cy="756" r="18" fill="#ec4899" opacity="0.25"/>
    <text x="425" y="761" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="700">5</text>
    <text x="455" y="750" fill="#f8fafc" font-size="13" font-weight="600">Send via WhatsApp</text>
    <text x="455" y="770" fill="#94a3b8" font-size="11">Retry 3× · alert admin on failure</text>
  </g>
  <path d="M 530 793 L 530 808" stroke="#ec4899" stroke-width="2" marker-end="url(#arr-pink)"/>

  <g>
    <rect x="395" y="813" width="270" height="60" rx="12" fill="#2a0f30" stroke="#5a2061" stroke-width="1"/>
    <circle cx="425" cy="843" r="18" fill="#ec4899" opacity="0.25"/>
    <text x="425" y="848" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="700">6</text>
    <text x="455" y="837" fill="#f8fafc" font-size="13" font-weight="600">Log result back to database</text>
    <text x="455" y="857" fill="#94a3b8" font-size="11">Success or failure · for audit</text>
  </g>

  <g filter="url(#card-glow)">
    <rect x="770" y="260" width="260" height="180" rx="20" fill="#0b1f17" stroke="url(#g-supabase)" stroke-width="1.5"/>
    <circle cx="825" cy="310" r="24" fill="url(#g-supabase)" opacity="0.2"/>
    <text x="825" y="320" text-anchor="middle" font-size="24">🗄</text>
    <text x="860" y="298" fill="#34d399" font-size="10" font-weight="700" letter-spacing="2">DATABASE</text>
    <text x="860" y="321" fill="#f8fafc" font-size="17" font-weight="700">Supabase</text>
    <text x="790" y="360" fill="#cbd5e1" font-size="12">• contacts — who to wish</text>
    <text x="790" y="380" fill="#cbd5e1" font-size="12">• birthday_log — who got wished</text>
    <text x="790" y="400" fill="#cbd5e1" font-size="12">• sync_log — audit trail</text>
    <text x="790" y="425" fill="#94a3b8" font-size="11">Postgres, free tier is plenty</text>
  </g>
  <text x="748" y="348" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">steps 2, 3, 6</text>

  <g filter="url(#card-glow)">
    <rect x="770" y="560" width="260" height="180" rx="20" fill="#140a28" stroke="url(#g-ai)" stroke-width="1.5"/>
    <circle cx="825" cy="610" r="24" fill="url(#g-ai)" opacity="0.2"/>
    <text x="825" y="620" text-anchor="middle" font-size="24">🤖</text>
    <text x="860" y="598" fill="#c4b5fd" font-size="10" font-weight="700" letter-spacing="2">AI ENGINE</text>
    <text x="860" y="621" fill="#f8fafc" font-size="17" font-weight="700">DeepSeek</text>
    <text x="790" y="660" fill="#cbd5e1" font-size="12">Takes the contact's context</text>
    <text x="790" y="680" fill="#cbd5e1" font-size="12">and writes something unique</text>
    <text x="790" y="705" fill="#94a3b8" font-size="11">~18× cheaper than OpenAI</text>
    <text x="790" y="721" fill="#94a3b8" font-size="11">Swap for any LLM you like</text>
  </g>
  <text x="748" y="648" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">step 4</text>

  <g filter="url(#card-glow)">
    <rect x="1100" y="410" width="260" height="180" rx="20" fill="#0b1f17" stroke="url(#g-wa)" stroke-width="1.5"/>
    <circle cx="1155" cy="460" r="24" fill="url(#g-wa)" opacity="0.2"/>
    <text x="1155" y="470" text-anchor="middle" font-size="24">💬</text>
    <text x="1190" y="448" fill="#4ade80" font-size="10" font-weight="700" letter-spacing="2">DELIVERY</text>
    <text x="1190" y="471" fill="#f8fafc" font-size="17" font-weight="700">Evolution API</text>
    <text x="1120" y="510" fill="#cbd5e1" font-size="12">Self-hosted WhatsApp gateway</text>
    <text x="1120" y="530" fill="#cbd5e1" font-size="12">Linked to your number by QR</text>
    <text x="1120" y="555" fill="#94a3b8" font-size="11">No Meta Business approval needed</text>
    <text x="1120" y="571" fill="#94a3b8" font-size="11">Message sent as you</text>
  </g>
  <text x="1080" y="498" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">step 5</text>

  <g>
    <circle cx="1230" cy="720" r="56" fill="url(#g-wa)" opacity="0.15"/>
    <circle cx="1230" cy="720" r="48" fill="#0b1f17" stroke="#22c55e" stroke-width="2.5"/>
    <text x="1230" y="730" text-anchor="middle" font-size="34">🎂</text>
  </g>
  <text x="1230" y="800" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700" letter-spacing="2">YOUR FRIEND</text>
  <text x="1230" y="820" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">receives personal WhatsApp</text>

  <path d="M 300 285 C 335 285, 360 285, 370 310" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arr-muted)" stroke-dasharray="5 5"/>
  <text x="335" y="278" fill="#94a3b8" font-size="10" font-weight="500">wakes up</text>

  <path d="M 300 525 C 335 525, 360 525, 370 485" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arr-muted)" stroke-dasharray="5 5"/>
  <text x="340" y="540" fill="#94a3b8" font-size="10" font-weight="500">daily sync</text>

  <path d="M 690 485 C 720 455, 745 370, 770 340" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <path d="M 770 400 C 745 460, 720 520, 690 560" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arr-green)" stroke-dasharray="5 5"/>

  <path d="M 690 665 C 720 650, 745 640, 770 630" stroke="#a78bfa" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <path d="M 770 680 C 745 695, 720 680, 690 680" stroke="#a78bfa" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)" stroke-dasharray="5 5"/>

  <path d="M 690 755 C 880 755, 1000 500, 1100 500" stroke="#22c55e" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>

  <path d="M 1230 590 L 1230 665" stroke="#22c55e" stroke-width="3" fill="none" marker-end="url(#arr-green)"/>

  <g transform="translate(0, 950)">
    <rect x="80" y="0" width="290" height="100" rx="14" fill="#1a1f2e" stroke="#334155" stroke-width="1"/>
    <text x="100" y="28" fill="#f472b6" font-size="11" font-weight="700" letter-spacing="1.5">ZERO MAINTENANCE</text>
    <text x="100" y="52" fill="#e2e8f0" font-size="13" font-weight="500">Add a friend to Google Contacts.</text>
    <text x="100" y="72" fill="#cbd5e1" font-size="12">Next year they get wished — no code change.</text>

    <rect x="400" y="0" width="290" height="100" rx="14" fill="#1a1f2e" stroke="#334155" stroke-width="1"/>
    <text x="420" y="28" fill="#a78bfa" font-size="11" font-weight="700" letter-spacing="1.5">GENUINELY PERSONAL</text>
    <text x="420" y="52" fill="#e2e8f0" font-size="13" font-weight="500">Tone, language, inside jokes — per person.</text>
    <text x="420" y="72" fill="#cbd5e1" font-size="12">No two messages ever come out the same.</text>

    <rect x="720" y="0" width="290" height="100" rx="14" fill="#1a1f2e" stroke="#334155" stroke-width="1"/>
    <text x="740" y="28" fill="#34d399" font-size="11" font-weight="700" letter-spacing="1.5">FULLY OPEN SOURCE</text>
    <text x="740" y="52" fill="#e2e8f0" font-size="13" font-weight="500">Self-hostable stack. No vendor lock-in.</text>
    <text x="740" y="72" fill="#cbd5e1" font-size="12">Runs on a $5 VPS. Your data stays yours.</text>

    <rect x="1040" y="0" width="290" height="100" rx="14" fill="#1a1f2e" stroke="#334155" stroke-width="1"/>
    <text x="1060" y="28" fill="#4ade80" font-size="11" font-weight="700" letter-spacing="1.5">TIMEZONE SMART</text>
    <text x="1060" y="52" fill="#e2e8f0" font-size="13" font-weight="500">Wishes land at midnight — their midnight.</text>
    <text x="1060" y="72" fill="#cbd5e1" font-size="12">Not yours. Feels real because it is.</text>
  </g>
</svg>
