<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0f23"/>
      <stop offset="1" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="cron-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="n8n-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="db-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="ai-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="wa-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25d366"/>
      <stop offset="1" stop-color="#128c7e"/>
    </linearGradient>
    <linearGradient id="google-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4285f4"/>
      <stop offset="1" stop-color="#1a73e8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#f3f4f6" font-size="28" font-weight="700">Birthday Bot — System Architecture</text>
  <text x="600" y="78" text-anchor="middle" fill="#9ca3af" font-size="14">AI-powered personalized WhatsApp birthday wishes</text>

  <!-- LAYER 1: Triggers -->
  <text x="80" y="130" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">SCHEDULED TRIGGERS</text>
  <g>
    <rect x="80" y="145" width="220" height="70" rx="12" fill="url(#cron-grad)" opacity="0.95"/>
    <text x="190" y="172" text-anchor="middle" fill="white" font-size="14" font-weight="600">⏰ Daily Cron</text>
    <text x="190" y="192" text-anchor="middle" fill="#fff8e7" font-size="11">18:00 UTC · Google sync</text>
    <text x="190" y="206" text-anchor="middle" fill="#fff8e7" font-size="11">18:30/23:00/00:00 UTC · wishes</text>
  </g>

  <!-- LAYER 2: Google Contacts -->
  <text x="80" y="260" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">SOURCE</text>
  <g>
    <rect x="80" y="275" width="220" height="80" rx="12" fill="url(#google-grad)" opacity="0.95"/>
    <text x="190" y="304" text-anchor="middle" fill="white" font-size="14" font-weight="600">📇 Google Contacts</text>
    <text x="190" y="324" text-anchor="middle" fill="#dbeafe" font-size="11">Names · phones · birthdays</text>
    <text x="190" y="340" text-anchor="middle" fill="#dbeafe" font-size="11">Filter: IN (+91) &amp; IE (+353)</text>
  </g>

  <!-- Arrow Google → n8n -->
  <path d="M 300 315 Q 380 315 420 315" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 4"/>

  <!-- LAYER 3: n8n Orchestrator (center) -->
  <text x="560" y="130" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">ORCHESTRATOR</text>
  <g filter="url(#glow)">
    <rect x="420" y="145" width="360" height="440" rx="16" fill="url(#n8n-grad)" opacity="0.15" stroke="#ec4899" stroke-width="1.5"/>
    <text x="600" y="175" text-anchor="middle" fill="#f9a8d4" font-size="16" font-weight="700">n8n Workflows</text>
    <text x="600" y="194" text-anchor="middle" fill="#fce7f3" font-size="11" opacity="0.8">Self-hosted · Docker</text>

    <!-- Node blocks inside n8n -->
    <rect x="445" y="215" width="310" height="34" rx="6" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="1"/>
    <text x="600" y="237" text-anchor="middle" fill="#fce7f3" font-size="12">1 · Determine batch &amp; date (timezone-aware)</text>

    <rect x="445" y="260" width="310" height="34" rx="6" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="1"/>
    <text x="600" y="282" text-anchor="middle" fill="#fce7f3" font-size="12">2 · Fetch active contacts from Supabase</text>

    <rect x="445" y="305" width="310" height="34" rx="6" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="1"/>
    <text x="600" y="327" text-anchor="middle" fill="#fce7f3" font-size="12">3 · Filter today's birthdays (leap-year aware)</text>

    <rect x="445" y="350" width="310" height="34" rx="6" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="1"/>
    <text x="600" y="372" text-anchor="middle" fill="#fce7f3" font-size="12">4 · Skip if already wished today</text>

    <rect x="445" y="395" width="310" height="34" rx="6" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="1"/>
    <text x="600" y="417" text-anchor="middle" fill="#fce7f3" font-size="12">5 · Generate personalized message (AI)</text>

    <rect x="445" y="440" width="310" height="34" rx="6" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="1"/>
    <text x="600" y="462" text-anchor="middle" fill="#fce7f3" font-size="12">6 · Send WhatsApp via Evolution</text>

    <rect x="445" y="485" width="310" height="34" rx="6" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="1"/>
    <text x="600" y="507" text-anchor="middle" fill="#fce7f3" font-size="12">7 · Log outcome to Supabase</text>

    <rect x="445" y="530" width="310" height="34" rx="6" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="1"/>
    <text x="600" y="552" text-anchor="middle" fill="#fce7f3" font-size="12">8 · Alert admin on success / failure</text>
  </g>

  <!-- Arrow Cron → n8n -->
  <path d="M 300 180 Q 380 180 420 220" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- LAYER 4: Supabase (right top) -->
  <text x="850" y="130" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">DATABASE</text>
  <g>
    <rect x="850" y="145" width="270" height="140" rx="12" fill="url(#db-grad)" opacity="0.95"/>
    <text x="985" y="175" text-anchor="middle" fill="white" font-size="14" font-weight="600">🗄 Supabase (Postgres)</text>
    <line x1="870" y1="188" x2="1100" y2="188" stroke="white" opacity="0.3"/>
    <text x="870" y="208" fill="#d1fae5" font-size="11">• contacts</text>
    <text x="1090" y="208" text-anchor="end" fill="#d1fae5" font-size="10" opacity="0.8">names · phones · tone · language</text>
    <text x="870" y="228" fill="#d1fae5" font-size="11">• birthday_log</text>
    <text x="1090" y="228" text-anchor="end" fill="#d1fae5" font-size="10" opacity="0.8">attempts · status · errors</text>
    <text x="870" y="248" fill="#d1fae5" font-size="11">• sync_log</text>
    <text x="1090" y="248" text-anchor="end" fill="#d1fae5" font-size="10" opacity="0.8">google sync audits</text>
    <text x="985" y="272" text-anchor="middle" fill="#a7f3d0" font-size="10" opacity="0.8">idempotent · one wish per person per day</text>
  </g>

  <!-- Arrow n8n ↔ Supabase -->
  <path d="M 780 280 L 850 215" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 850 245 L 780 310" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- LAYER 5: DeepSeek (right middle) -->
  <text x="850" y="320" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">AI ENGINE</text>
  <g>
    <rect x="850" y="335" width="270" height="100" rx="12" fill="url(#ai-grad)" opacity="0.95"/>
    <text x="985" y="365" text-anchor="middle" fill="white" font-size="14" font-weight="600">🤖 DeepSeek API</text>
    <text x="985" y="387" text-anchor="middle" fill="#ede9fe" font-size="11">Tone · language · inside jokes</text>
    <text x="985" y="405" text-anchor="middle" fill="#ede9fe" font-size="11">→ unique message per contact</text>
    <text x="985" y="424" text-anchor="middle" fill="#c4b5fd" font-size="10" opacity="0.8">OpenAI-compatible · deepseek-chat</text>
  </g>

  <!-- Arrow n8n ↔ DeepSeek -->
  <path d="M 780 412 L 850 395" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 850 425 L 780 432" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- LAYER 6: Evolution + WhatsApp (right bottom) -->
  <text x="850" y="470" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">DELIVERY</text>
  <g>
    <rect x="850" y="485" width="270" height="100" rx="12" fill="url(#wa-grad)" opacity="0.95"/>
    <text x="985" y="515" text-anchor="middle" fill="white" font-size="14" font-weight="600">💬 Evolution API</text>
    <text x="985" y="537" text-anchor="middle" fill="#d1fae5" font-size="11">Self-hosted WhatsApp gateway</text>
    <text x="985" y="555" text-anchor="middle" fill="#d1fae5" font-size="11">→ direct message to contact</text>
    <text x="985" y="574" text-anchor="middle" fill="#a7f3d0" font-size="10" opacity="0.8">3× retry · admin alert on failure</text>
  </g>

  <!-- Arrow n8n → Evolution -->
  <path d="M 780 475 L 850 520" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Recipient (bottom) -->
  <g>
    <circle cx="985" cy="680" r="40" fill="#25d366" opacity="0.9"/>
    <text x="985" y="673" text-anchor="middle" fill="white" font-size="22">🎂</text>
    <text x="985" y="692" text-anchor="middle" fill="white" font-size="10" font-weight="600">YOUR FRIEND</text>
  </g>
  <path d="M 985 590 L 985 640" stroke="#25d366" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="1010" y="620" fill="#25d366" font-size="11" font-weight="600">WhatsApp</text>

  <!-- Legend -->
  <g transform="translate(80, 650)">
    <text x="0" y="0" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="2">DATA FLOW</text>
    <line x1="0" y1="20" x2="24" y2="20" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="32" y="24" fill="#9ca3af" font-size="11">Real-time request</text>
    <line x1="0" y1="44" x2="24" y2="44" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
    <text x="32" y="48" fill="#9ca3af" font-size="11">Scheduled sync</text>
  </g>

  <!-- Footer tagline -->
  <text x="600" y="770" text-anchor="middle" fill="#6b7280" font-size="11" font-style="italic">No more forgotten birthdays. No more generic "HBD 🎉" messages.</text>
</svg>
